<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Los Simpson</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <!-- buscador -->
    <form class="buscador">
      <input type="text" class="form-control buscador-input" placeholder="Buscar...">
      <button type="submit">Buscar</button>
    </form>
    <!-- listar personajes -->
    <div class="container">
      <div class="row" id="personajes-container"></div>
    </div>
    <!-- Modal de detalle -->
    <div class="modal fade" id="detalleModal" tabindex="-1" aria-labelledby="detalleModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="modal-nombre">Nombre del Personaje</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <img id="modal-imagen" src="" alt="" class="img-fluid rounded mb-3" style="max-height: 300px;">
            <div class="text-start">
              <p><strong>Edad:</strong> <span id="modal-edad"></span></p>
              <p><strong>Fecha de Nacimiento:</strong> <span id="modal-nacimiento"></span></p>
              <p><strong>Género:</strong> <span id="modal-genero"></span></p>
              <p><strong>Ocupación:</strong> <span id="modal-ocupacion"></span></p>
              <p><strong>Estado:</strong> <span id="modal-estado"></span></p>
              <hr>
              <p><strong>Frase característica:</strong></p>
              <blockquote class="blockquote bg-light p-3 rounded italic">
                <p class="mb-0 fs-6" id="modal-frase">"Frase aquí"</p>
              </blockquote>
            </div>
          </div>
        <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
      </div>
        </div>
      </div>
      </div>
        <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script src="assets/js/app.js"></script>
  
  </body>
</html>
